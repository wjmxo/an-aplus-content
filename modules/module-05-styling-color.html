<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1464, initial-scale=1">
  <title>Module 05 - Styling And Color</title>
  <style>
    :root {
      --brand-primary: #5E2A35;
      --brand-accent: #B08D6E;
      --brand-bg: #F4F2EE;
      --brand-card: #FFFFFF;
      --brand-warm: #EAE5DE;
      --brand-text: #1F1B1A;
      --brand-muted: #7C7369;
      --white: #F8F6F2;
      --red: #B34236;
      --wine: #5E2A35;
      --brown: #6B4A36;
      --black: #1F1B1A;
    }

    * { box-sizing: border-box; }
    body {
      width: 1464px;
      height: 600px;
      margin: 0;
      overflow: hidden;
      background: var(--brand-bg);
      color: var(--brand-text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .canvas {
      width: 1464px;
      height: 600px;
      position: relative;
      padding: 48px 66px;
      background:
        linear-gradient(90deg, rgba(255,255,255,.62), rgba(255,255,255,0) 58%),
        linear-gradient(135deg, #F4F2EE 0%, #EFE8DD 100%);
    }

    .copy {
      position: relative;
      z-index: 3;
      width: 450px;
      padding-top: 14px;
    }

    .script {
      margin-bottom: 10px;
      color: var(--brand-accent);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 44px;
      font-style: italic;
      line-height: 1;
    }

    h1 {
      width: 500px;
      margin: 0 0 22px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 62px;
      line-height: .98;
      font-weight: 500;
      letter-spacing: 3px;
    }

    .body {
      margin: 0;
      width: 420px;
      color: var(--brand-muted);
      font-size: 25px;
      line-height: 1.32;
    }

    .chips {
      display: flex;
      gap: 12px;
      margin-top: 26px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      border: 1px solid rgba(94,42,53,.18);
      color: var(--brand-primary);
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stage {
      position: absolute;
      right: 58px;
      top: 48px;
      width: 810px;
      height: 430px;
    }

    .main-card {
      position: absolute;
      left: 0;
      top: 18px;
      width: 372px;
      height: 382px;
      padding: 10px 10px 54px;
      border-radius: 8px;
      background: rgba(255,255,255,.9);
      box-shadow: 0 16px 36px rgba(72,52,38,.15);
      transform: rotate(-3deg);
      overflow: hidden;
    }

    .main-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .main-card span {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 17px;
      text-align: center;
      color: var(--brand-primary);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 22px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .swatches {
      position: absolute;
      right: 0;
      top: 0;
      width: 382px;
      min-height: 318px;
      padding: 28px 30px;
      border-radius: 8px;
      background: rgba(255,255,255,.70);
      border: 1px solid rgba(94,42,53,.16);
      box-shadow: 0 14px 30px rgba(72,52,38,.10);
    }

    .swatches h2 {
      margin: 0 0 22px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 32px;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--brand-primary);
      text-transform: uppercase;
    }

    .row {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 14px;
      align-items: center;
      margin-bottom: 15px;
      color: var(--brand-muted);
      font-size: 23px;
    }

    .dot {
      width: 31px;
      height: 31px;
      border-radius: 50%;
      border: 2px solid rgba(94,42,53,.20);
      background: var(--color);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.55);
    }

    .ribbon {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 72px;
      background: #C9B9A3;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 86px;
      color: #fff;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 24px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main class="canvas" aria-label="ELARAISE styling and colors">
    <section class="copy">
      <div class="script">Versatile</div>
      <h1>ONE TOP, MANY LOOKS</h1>
      <p class="body">Pair with denim, boots, skirts, jackets, or cardigans across five easy wardrobe colors.</p>
      <div class="chips">
        <span class="chip">Tuck In</span>
        <span class="chip">Layer Up</span>
        <span class="chip">Wear Solo</span>
      </div>
    </section>

    <section class="stage">
      <article class="main-card">
        <img src="../assets/color-wine.jpg" alt="Wine Henley outfit styling">
        <span>Wine</span>
      </article>
      <article class="swatches" aria-label="Five color options">
        <h2>Color Selection</h2>
        <div class="row"><span class="dot" style="--color: var(--white)"></span><span>White</span></div>
        <div class="row"><span class="dot" style="--color: var(--red)"></span><span>Red</span></div>
        <div class="row"><span class="dot" style="--color: var(--wine)"></span><span>Wine</span></div>
        <div class="row"><span class="dot" style="--color: var(--brown)"></span><span>Brown</span></div>
        <div class="row"><span class="dot" style="--color: var(--black)"></span><span>Black</span></div>
      </article>
    </section>

    <footer class="ribbon" aria-label="styling keywords">
      <span>Five wearable colors</span>
      <span>Soft ribbed texture</span>
      <span>Easy layering</span>
    </footer>
  </main>
</body>
</html>
