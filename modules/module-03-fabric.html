<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1464, initial-scale=1">
  <title>Module 03 - Fabric</title>
  <style>
    :root {
      --brand-primary: #5E2A35;
      --brand-accent: #B08D6E;
      --brand-bg: #F4F2EE;
      --brand-card: #FFFFFF;
      --brand-warm: #EAE5DE;
      --brand-text: #1F1B1A;
      --brand-muted: #7C7369;
    }

    * { box-sizing: border-box; }
    body {
      width: 1464px;
      height: 600px;
      margin: 0;
      overflow: hidden;
      background: var(--brand-bg);
      color: var(--brand-text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .canvas {
      position: relative;
      width: 1464px;
      height: 600px;
      padding: 52px 70px;
      background:
        linear-gradient(90deg, rgba(255,255,255,.72), rgba(255,255,255,0) 52%),
        linear-gradient(135deg, #F4F2EE 0%, #EFE8DD 100%);
    }

    .copy {
      position: relative;
      z-index: 3;
      width: 440px;
      padding-top: 26px;
    }

    .eyebrow {
      color: var(--brand-accent);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 44px;
      font-style: italic;
      line-height: 1;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 22px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 64px;
      line-height: .96;
      font-weight: 500;
      letter-spacing: 3px;
    }

    .body {
      margin: 0 0 18px;
      color: var(--brand-muted);
      font-size: 26px;
      line-height: 1.32;
    }

    .composition {
      display: inline-block;
      padding: 10px 18px;
      background: rgba(255,255,255,.66);
      border: 1px solid rgba(94,42,53,.18);
      color: var(--brand-primary);
      border-radius: 999px;
      font-size: 18px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .fabric-card {
      position: absolute;
      right: 74px;
      top: 46px;
      width: 592px;
      height: 492px;
      border: 12px solid rgba(255,255,255,.88);
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 18px 42px rgba(72,52,38,.16);
    }

    .fabric-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 63% 50%;
      transform: scale(1.12);
      filter: saturate(.94) contrast(1.05);
    }

    .wear-card {
      position: absolute;
      right: 548px;
      bottom: 54px;
      width: 270px;
      height: 350px;
      border: 10px solid rgba(255,255,255,.9);
      border-radius: 7px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 16px 34px rgba(72,52,38,.14);
      transform: rotate(-3deg);
      z-index: 2;
    }

    .wear-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 27% 48%;
      transform: scale(1.86);
    }

    .proofs {
      position: absolute;
      left: 70px;
      bottom: 28px;
      display: flex;
      gap: 16px;
    }

    .proof {
      min-width: 136px;
      padding: 10px 16px;
      border-radius: 999px;
      color: var(--brand-primary);
      background: rgba(255,255,255,.74);
      border: 1px solid rgba(94,42,53,.20);
      font-size: 18px;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="canvas" aria-label="ELARAISE fabric module">
    <section class="copy">
      <div class="eyebrow">Soft</div>
      <h1>SOFT STRETCH FEEL</h1>
      <p class="body">Smooth ribbed knit moves with you and keeps a lightweight feel for solo wear or layering.</p>
      <span class="composition">95% Viscose + 5% Spandex</span>
    </section>

    <section class="wear-card" aria-label="Ribbed top worn on body">
      <img src="../assets/fabric-03.png" alt="Wine Henley neckline and button detail">
    </section>
    <section class="fabric-card" aria-label="Ribbed knit close up">
      <img src="../assets/fabric-03.png" alt="Wine and white ribbed fabric texture">
    </section>

    <section class="proofs" aria-label="Fabric attributes">
      <div class="proof">Soft</div>
      <div class="proof">Stretchy</div>
      <div class="proof">Machine Wash</div>
    </section>
  </main>
</body>
</html>
