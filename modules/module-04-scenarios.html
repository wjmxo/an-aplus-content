<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1464, initial-scale=1">
  <title>Module 04 - Suitable Scenarios</title>
  <style>
    :root {
      --brand-primary: #5E2A35;
      --brand-accent: #B08D6E;
      --brand-bg: #F4F2EE;
      --brand-warm: #EAE5DE;
      --brand-text: #1F1B1A;
      --brand-muted: #7C7369;
    }

    * { box-sizing: border-box; }
    body {
      width: 1464px;
      height: 600px;
      margin: 0;
      overflow: hidden;
      background: var(--brand-bg);
      color: var(--brand-text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .canvas {
      width: 1464px;
      height: 600px;
      padding: 44px 62px 52px;
      background:
        radial-gradient(circle at 84% 10%, rgba(255,255,255,.72), transparent 26%),
        linear-gradient(135deg, #F4F2EE 0%, #EFE8DD 100%);
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 54px;
      line-height: 1;
      font-weight: 500;
      letter-spacing: 3px;
    }

    .sub {
      margin: 0;
      color: var(--brand-muted);
      font-size: 24px;
      letter-spacing: .4px;
    }

    .panels {
      position: relative;
      height: 390px;
      overflow: hidden;
      border: 9px solid rgba(255,255,255,.88);
      border-radius: 6px;
      background: #fff;
      box-shadow: 0 14px 30px rgba(72,52,38,.13);
    }

    .panels > img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 29%;
      display: block;
    }

    .label {
      position: absolute;
      bottom: 0;
      height: 50px;
      display: grid;
      place-items: center;
      background: rgba(201,185,163,.90);
      color: #fff;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 22px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .label:nth-of-type(1) { left: 0; width: 25%; }
    .label:nth-of-type(2) { left: 25%; width: 25%; }
    .label:nth-of-type(3) { left: 50%; width: 25%; }
    .label:nth-of-type(4) { left: 75%; width: 25%; }
  </style>
</head>
<body>
  <main class="canvas" aria-label="ELARAISE suitable scenarios">
    <section class="header">
      <h1>STYLE IT YOUR WAY</h1>
      <p class="sub">Wear it tucked into denim, layered under a jacket, or styled on its own for a clean fitted look.</p>
    </section>

    <section class="panels" aria-label="Four styling scenarios">
      <img src="../assets/scenarios-04.png" alt="Work, daily, shopping, and date styling with ELARAISE Henley tops">
      <div class="label">Work</div>
      <div class="label">Daily</div>
      <div class="label">Shopping</div>
      <div class="label">Date</div>
    </section>
  </main>
</body>
</html>
